<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <title>Profil — Adtage</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body data-page="profile">
    <div class="app-frame has-tabbar">
      <header class="top-bar">
        <div><h1>Profil</h1></div>
        <a href="index.html" class="btn btn-ghost btn-sm">Chiqish</a>
      </header>

      <main class="page-content" style="padding-top: 0">
        <div class="profile-header">
          <div class="profile-avatar"></div>
          <h2 style="font-size: 22px; font-weight: 700; letter-spacing: -0.02em">Umidjon Qobiljonov</h2>
          <p style="font-size: 14px; color: var(--ink-secondary); margin-top: 4px">
            Toshkent №45 · 11-sinf
          </p>
          <div style="display: flex; gap: 8px; justify-content: center; margin-top: 12px">
            <span class="badge badge-gold">Daraja 18</span>
            <span class="badge badge-blue">12 450 XP</span>
          </div>
        </div>

        <div class="card card-lg">
          <p class="card-title">Shaxsiy ma'lumotlar</p>
          <div class="form-group" style="margin-top: 16px">
            <label for="name">To'liq ism</label>
            <input id="name" class="form-input" type="text" value="Umidjon Qobiljonov" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" class="form-input" type="email" value="sardor@example.uz" />
          </div>
          <div class="form-group">
            <label for="phone">Telefon</label>
            <input id="phone" class="form-input" type="tel" value="+998 90 123 45 67" />
          </div>
          <button type="button" class="btn btn-primary btn-block">Saqlash</button>
        </div>

        <div class="card" style="margin-top: 16px">
          <p class="card-title">Bildirishnomalar</p>
          <div class="toggle-row">
            <span style="font-size: 15px">Kunlik eslatmalar</span>
            <div class="toggle on" role="switch" aria-checked="true" tabindex="0"></div>
          </div>
          <div class="toggle-row">
            <span style="font-size: 15px">Test natijalari</span>
            <div class="toggle on" role="switch" aria-checked="true" tabindex="0"></div>
          </div>
          <div class="toggle-row">
            <span style="font-size: 15px">AI tavsiyalari</span>
            <div class="toggle on" role="switch" aria-checked="true" tabindex="0"></div>
          </div>
          <div class="toggle-row">
            <span style="font-size: 15px">Reyting yangilanishlari</span>
            <div class="toggle" role="switch" aria-checked="false" tabindex="0"></div>
          </div>
        </div>

        <div class="card" style="margin-top: 16px; margin-bottom: 24px">
          <p class="card-title">Yutuqlar</p>
          <div
            style="
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 10px;
              margin-top: 14px;
              text-align: center;
              font-size: 11px;
            "
          >
            <div>
              <span style="font-size: 28px">🎯</span>
              <p style="margin-top: 6px; font-weight: 600">1-test</p>
            </div>
            <div>
              <span style="font-size: 28px">🔥</span>
              <p style="margin-top: 6px; font-weight: 600">7 kun</p>
            </div>
            <div>
              <span style="font-size: 28px">🏆</span>
              <p style="margin-top: 6px; font-weight: 600">DTM</p>
            </div>
          </div>
          <a
            href="leaderboard.html"
            class="btn btn-secondary btn-block btn-sm"
            style="margin-top: 16px"
            >Reytingni ko'rish</a
          >
        </div>
      </main>

      <nav class="tab-bar" aria-label="Asosiy menyu">
        <a href="dashboard.html" class="tab-item" data-page="dashboard"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg
          >Bosh</a
        >
        <a href="ai-tutor.html" class="tab-item" data-page="ai-tutor"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path
              d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"
            /></svg
          >AI</a
        >
        <a href="library.html" class="tab-item" data-page="library"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg
          >Kutubxona</a
        >
        <a href="analytics.html" class="tab-item" data-page="analytics"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 3v18h18" />
            <path d="M7 16l4-4 4 4 6-8" /></svg
          >Tahlil</a
        >
        <a href="profile.html" class="tab-item" data-page="profile"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          >Profil</a
        >
      </nav>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
