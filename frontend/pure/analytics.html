<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <title>Analitika — Adtage</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body data-page="analytics">
    <div class="app-frame has-tabbar">
      <header class="top-bar">
        <div>
          <h1>Analitika</h1>
          <p class="subtitle">DTM tayyorligi</p>
        </div>
      </header>

      <main class="page-content">
        <div class="metric-grid">
          <div class="metric-card">
            <p class="metric-label">Tayyorlik</p>
            <p class="metric-value">78%</p>
          </div>
          <div class="metric-card">
            <p class="metric-label">O'rtacha</p>
            <p class="metric-value">82%</p>
          </div>
        </div>

        <div class="card card-lg animate-in" style="margin-top: 16px">
          <p class="card-title">Haftalik progress</p>
          <div class="chart-wrap">
            <canvas
              id="lineChart"
              class="chart"
              role="img"
              aria-label="Haftalik ball grafigi"
            ></canvas>
          </div>
        </div>

        <div class="card animate-in" style="margin-top: 16px; animation-delay: 0.1s">
          <p class="card-title">Fanlar bo'yicha</p>
          <div class="chart-wrap">
            <canvas id="barChart" class="chart" role="img" aria-label="Fanlar grafigi"></canvas>
          </div>
        </div>

        <div class="card animate-in" style="margin-top: 16px; animation-delay: 0.15s">
          <p class="card-title">Kuchli mavzular</p>
          <div style="margin-top: 12px">
            <div style="display: flex; justify-content: space-between; font-size: 14px">
              <span>Algebra</span><strong style="color: var(--success)">92%</strong>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width: 92%; background: var(--success)"></div>
            </div>
          </div>
          <div style="margin-top: 14px">
            <div style="display: flex; justify-content: space-between; font-size: 14px">
              <span>Ona tili</span><strong style="color: var(--success)">88%</strong>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width: 88%; background: var(--success)"></div>
            </div>
          </div>
        </div>

        <div class="card animate-in" style="margin-top: 16px; animation-delay: 0.2s">
          <p class="card-title">Zaif mavzular</p>
          <div style="margin-top: 12px">
            <div style="display: flex; justify-content: space-between; font-size: 14px">
              <span>Trigonometriya</span><strong style="color: var(--danger)">45%</strong>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width: 45%; background: var(--danger)"></div>
            </div>
          </div>
          <div style="margin-top: 14px">
            <div style="display: flex; justify-content: space-between; font-size: 14px">
              <span>Organik kimyo</span><strong style="color: var(--danger)">52%</strong>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width: 52%; background: var(--danger)"></div>
            </div>
          </div>
        </div>
      </main>

      <nav class="tab-bar" aria-label="Asosiy menyu">
        <a href="dashboard.html" class="tab-item" data-page="dashboard"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg
          >Bosh</a
        >
        <a href="ai-tutor.html" class="tab-item" data-page="ai-tutor"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path
              d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"
            /></svg
          >AI</a
        >
        <a href="library.html" class="tab-item" data-page="library"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg
          >Kutubxona</a
        >
        <a href="analytics.html" class="tab-item" data-page="analytics"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 3v18h18" />
            <path d="M7 16l4-4 4 4 6-8" /></svg
          >Tahlil</a
        >
        <a href="profile.html" class="tab-item" data-page="profile"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          >Profil</a
        >
      </nav>
    </div>
    <script src="js/app.js"></script>
    <script src="js/charts.js"></script>
    <script>
      window.__chartData = {
        line: {
          id: 'lineChart',
          labels: ['Du', 'Se', 'Ch', 'Pa', 'Ju', 'Sh', 'Ya'],
          values: [72, 85, 68, 91, 78, 95, 82],
        },
        bar: {
          id: 'barChart',
          labels: ['Algebra', 'Fizika', 'Kimyo', 'Bio'],
          values: [92, 72, 65, 58],
          color: '#0071e3',
        },
      };
      drawLineChart('lineChart', window.__chartData.line.labels, window.__chartData.line.values);
      drawBarChart('barChart', window.__chartData.bar.labels, window.__chartData.bar.values);
    </script>
  </body>
</html>
