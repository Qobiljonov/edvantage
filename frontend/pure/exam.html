<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <title>Imtihon simulyatori — Adtage</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body data-page="exam">
    <div class="app-frame">
      <div id="examIntro">
        <header class="top-bar">
          <a href="dashboard.html" class="top-bar-back" aria-label="Orqaga"
            ><svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M15 18l-6-6 6-6" /></svg
          ></a>
          <div style="flex: 1; text-align: center"><h1>Simulyator</h1></div>
          <div style="width: 36px"></div>
        </header>
        <main class="page-content" style="text-align: center; padding-top: 40px">
          <div
            style="
              width: 72px;
              height: 72px;
              border-radius: 22px;
              background: var(--ink);
              color: #fff;
              display: flex;
              align-items: center;
              justify-content: center;
              margin: 0 auto;
            "
          >
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M12 6v6l4 2" />
            </svg>
          </div>
          <h2 style="font-size: 24px; font-weight: 700; margin-top: 24px; letter-spacing: -0.03em">
            DTM to'liq simulyatsiya
          </h2>
          <p style="color: var(--ink-secondary); margin-top: 8px; font-size: 15px">
            90 savol · 90 daqiqa · CBT
          </p>
          <div class="stats-strip" style="margin: 32px 0 0">
            <div class="stat-cell"><strong>90</strong><span>Savol</span></div>
            <div class="stat-cell"><strong>90</strong><span>Daqiqa</span></div>
          </div>
          <button
            type="button"
            id="examStart"
            class="btn btn-primary btn-block"
            style="margin-top: 32px"
          >
            Boshlash
          </button>
        </main>
      </div>

      <div id="examMain" hidden>
        <header class="top-bar">
          <span class="badge badge-blue">Savol <span id="qNum">1</span>/3</span>
          <span id="examTimer" class="exam-timer">90:00</span>
        </header>
        <main class="page-content">
          <div class="progress-track" style="margin-bottom: 20px">
            <div class="progress-fill" style="width: 33%"></div>
          </div>
          <p
            id="questionText"
            style="font-size: 20px; font-weight: 600; line-height: 1.35; letter-spacing: -0.02em"
          ></p>
          <div id="options" style="margin-top: 24px"></div>
          <div style="display: flex; gap: 12px; margin-top: 28px">
            <button type="button" id="prevQ" class="btn btn-secondary" style="flex: 1">
              Oldingi
            </button>
            <button type="button" id="nextQ" class="btn btn-primary" style="flex: 1">
              Keyingi
            </button>
          </div>
        </main>
        <div id="questionDots" class="question-dots"></div>
      </div>

      <div id="examFinish" hidden>
        <main class="page-content" style="text-align: center; padding-top: 80px">
          <p
            style="font-size: 56px; font-weight: 700; letter-spacing: -0.04em; color: var(--accent)"
          >
            78%
          </p>
          <p style="font-size: 17px; color: var(--ink-secondary); margin-top: 8px">
            Taxminiy natija
          </p>
          <a href="analytics.html" class="btn btn-primary btn-block" style="margin-top: 32px"
            >Tahlilni ko'rish</a
          >
          <a href="dashboard.html" class="btn btn-secondary btn-block" style="margin-top: 12px"
            >Bosh sahifa</a
          >
        </main>
      </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/exam.js"></script>
  </body>
</html>
