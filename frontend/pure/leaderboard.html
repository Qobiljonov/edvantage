<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <title>Reyting — Adtage</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body data-page="leaderboard">
    <div class="app-frame has-tabbar">
      <header class="top-bar">
        <a href="dashboard.html" class="top-bar-back" aria-label="Orqaga"
          ><svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M15 18l-6-6 6-6" /></svg
        ></a>
        <div style="flex: 1; text-align: center">
          <h1>Reyting</h1>
          <p class="subtitle">Maktab · Hudud · Respublika</p>
        </div>
        <div style="width: 36px"></div>
      </header>

      <main class="page-content">
        <div class="metric-grid" style="margin-bottom: 16px">
          <div class="metric-card">
            <p class="metric-label">Maktab</p>
            <p class="metric-value">#3</p>
          </div>
          <div class="metric-card">
            <p class="metric-label">Hudud</p>
            <p class="metric-value">#47</p>
          </div>
        </div>

        <div class="chips chip-group" style="padding: 0 0 16px">
          <button type="button" class="chip active">Maktab</button>
          <button type="button" class="chip">Sinf</button>
          <button type="button" class="chip">Hudud</button>
          <button type="button" class="chip">Respublika</button>
        </div>

        <div class="card">
          <div class="list-row">
            <span class="rank-badge rank-1">🥇</span>
            <div class="avatar">DR</div>
            <div class="row-body"><p class="row-title">Dilnoza Rahimova</p></div>
            <span class="row-value">9 850</span>
          </div>
          <div class="list-row">
            <span class="rank-badge rank-2">🥈</span>
            <div class="avatar">JT</div>
            <div class="row-body"><p class="row-title">Jasur Toshmatov</p></div>
            <span class="row-value">9 420</span>
          </div>
          <div
            class="list-row"
            style="
              background: var(--accent-soft);
              margin: 0 -16px;
              padding-left: 16px;
              padding-right: 16px;
              border-radius: 12px;
            "
          >
            <span class="rank-badge rank-3">🥉</span>
            <div class="avatar">QU</div>
            <div class="row-body">
              <p class="row-title">Umidjon Qobiljonov</p>
              <span class="badge badge-blue" style="margin-top: 4px">Siz</span>
            </div>
            <span class="row-value">12 450</span>
          </div>
          <div class="list-row">
            <span
              class="rank-badge"
              style="
                background: var(--bg-secondary);
                font-size: 14px;
                font-weight: 700;
                color: var(--ink-tertiary);
              "
              >4</span
            >
            <div class="avatar">MY</div>
            <div class="row-body"><p class="row-title">Malika Yusupova</p></div>
            <span class="row-value">8 900</span>
          </div>
          <div class="list-row">
            <span
              class="rank-badge"
              style="
                background: var(--bg-secondary);
                font-size: 14px;
                font-weight: 700;
                color: var(--ink-tertiary);
              "
              >5</span
            >
            <div class="avatar">BA</div>
            <div class="row-body"><p class="row-title">Bobur Aliyev</p></div>
            <span class="row-value">8 650</span>
          </div>
        </div>
      </main>

      <nav class="tab-bar" aria-label="Asosiy menyu">
        <a href="dashboard.html" class="tab-item" data-page="dashboard"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg
          >Bosh</a
        >
        <a href="ai-tutor.html" class="tab-item" data-page="ai-tutor"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path
              d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"
            /></svg
          >AI</a
        >
        <a href="library.html" class="tab-item" data-page="library"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg
          >Kutubxona</a
        >
        <a href="analytics.html" class="tab-item" data-page="analytics"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 3v18h18" />
            <path d="M7 16l4-4 4 4 6-8" /></svg
          >Tahlil</a
        >
        <a href="profile.html" class="tab-item" data-page="profile"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          >Profil</a
        >
      </nav>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
