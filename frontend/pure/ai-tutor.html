<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <title>AI Ustoz — Adtage</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      .chat-page {
        display: flex;
        flex-direction: column;
        min-height: calc(100dvh - var(--header-height) - var(--tab-height) - var(--safe-bottom));
      }
    </style>
  </head>
  <body data-page="ai-tutor">
    <div class="app-frame has-tabbar">
      <header class="top-bar">
        <a href="dashboard.html" class="top-bar-back" aria-label="Orqaga">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </a>
        <div style="flex: 1; text-align: center">
          <h1>AI Ustoz</h1>
          <p class="subtitle">24/7 · O'zbek tilida</p>
        </div>
        <div style="width: 36px"></div>
      </header>

      <div class="chat-page">
        <div class="chips">
          <button type="button" class="chip" data-suggest="Trigonometriyani tushuntiring">
            Trigonometriya
          </button>
          <button type="button" class="chip" data-suggest="DTM test yarating">Test yaratish</button>
          <button type="button" class="chip" data-suggest="30 kunlik reja tuzing">
            O'quv rejasi
          </button>
        </div>
        <div id="chatArea" class="chat-area">
          <div class="bubble bubble-ai">
            Salom, Sardor! Men sizning AI ustozingizman. Bugun qanday mavzuda yordam kerak?
          </div>
        </div>
        <form id="chatForm" class="chat-input-bar">
          <label
            class="sr-only"
            for="chatInput"
            style="position: absolute; width: 1px; height: 1px; overflow: hidden"
            >Xabar</label
          >
          <input
            id="chatInput"
            class="chat-input"
            type="text"
            placeholder="Savolingizni yozing..."
            autocomplete="off"
          />
          <button type="submit" class="send-btn" aria-label="Yuborish">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 2L11 13" />
              <path d="M22 2l-7 20-4-9-9-4 20-7z" />
            </svg>
          </button>
        </form>
      </div>

      <nav class="tab-bar" aria-label="Asosiy menyu">
        <a href="dashboard.html" class="tab-item" data-page="dashboard"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg
          >Bosh</a
        >
        <a href="ai-tutor.html" class="tab-item" data-page="ai-tutor"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path
              d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"
            /></svg
          >AI</a
        >
        <a href="library.html" class="tab-item" data-page="library"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg
          >Kutubxona</a
        >
        <a href="analytics.html" class="tab-item" data-page="analytics"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 3v18h18" />
            <path d="M7 16l4-4 4 4 6-8" /></svg
          >Tahlil</a
        >
        <a href="profile.html" class="tab-item" data-page="profile"
          ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          >Profil</a
        >
      </nav>
    </div>
    <script src="js/app.js"></script>
    <script src="js/ai-tutor.js"></script>
  </body>
</html>
